<div class="interaction-container">
  <h2>{{ message }}</h2>

  <button (click)="onButtonClick()">Click Me!</button>

  <div (mouseenter)="onMouseEnter()" class="hover-box">
    Hover over this area
  </div>

  <input type="text" #inputEl (input)="onInputChange(inputEl)" placeholder="Type something...">
</div>
